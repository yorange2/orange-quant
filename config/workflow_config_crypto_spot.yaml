# =============================================================
# Orange Quant 加密货币实验 — U 现货 (13 币种)
# =============================================================
# 数据: Hyperliquid 合约日线 (价格与现货 1:1)
# 交易: Hyperliquid U 封装现货 (UBTC, UETH, USOL...)
# 成本: 纯现货费率，无资金费率
# =============================================================

qlib_init:
    provider_uri: "~/.qlib/qlib_data/crypto"
    region: cn

data:
    instruments: u_spot     # 9 个有 U 封装现货的币种

train:
    start: "2023-06-01"
    end: "2026-03-31"
valid:
    start: "2026-04-01"
    end: "2026-05-15"
test:
    start: "2026-05-16"
    end: "2026-06-27"

model:
    class: LightGBMTrainer
    module_path: orange_quant.models.trainer
    kwargs:
        loss: mse
        num_boost_round: 300
        early_stopping_rounds: 30
        learning_rate: 0.03
        num_leaves: 16            # 9币种，降低复杂度
        feature_fraction: 0.6
        bagging_fraction: 0.6
        bagging_freq: 1
        min_data_in_leaf: 10
        lambda_l1: 1.0
        lambda_l2: 1.0
        verbose_eval: 20

strategy:
    class: MomentumTopKStrategy
    module_path: orange_quant.strategies.mom_topk
    kwargs:
        signal: <PRED>
        topk: 5                # 9币种中持有前5
        n_drop: 2               # 每日换2只
        hold_thresh: 1
        risk_degree: 0.95

backtest:
    benchmark: BTC
    account: 1000000
    freq: day
    # 现货成本（U 封装代币，0.05% taker fee ×2，无资金费率）
    exchange_kwargs:
        freq: day
        limit_threshold: 1.0
        deal_price: close
        open_cost: 0.0005
        close_cost: 0.0005
        min_cost: 0
