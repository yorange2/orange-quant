# =============================================================
# Orange Quant 加密货币实验 — 187 个币种
# =============================================================
# 数据来源: Hyperliquid Perpetual Futures (2023-06 ~ 2026-06)
# 币种: 187 个 (自动过滤 k 前缀微盘币 + 数据不足 365 天的)
# =============================================================

qlib_init:
    provider_uri: "~/.qlib/qlib_data/crypto"
    region: cn

data:
    instruments: all

train:
    start: "2023-06-01"
    end: "2026-03-31"
valid:
    start: "2026-04-01"
    end: "2026-05-15"
test:
    start: "2026-05-16"
    end: "2026-06-27"

model:
    class: LightGBMTrainer
    module_path: orange_quant.models.trainer
    kwargs:
        loss: mse
        num_boost_round: 300
        early_stopping_rounds: 30
        learning_rate: 0.03
        num_leaves: 64            # 187个币种，可以用更多叶子
        feature_fraction: 0.7
        bagging_fraction: 0.7
        bagging_freq: 1
        min_data_in_leaf: 20
        lambda_l1: 0.5
        lambda_l2: 0.5
        verbose_eval: 20

strategy:
    class: MomentumTopKStrategy
    module_path: orange_quant.strategies.mom_topk
    kwargs:
        signal: <PRED>
        topk: 30               # 持仓30只
        n_drop: 5               # 每日换5只
        hold_thresh: 1
        risk_degree: 0.95

backtest:
    benchmark: BTC
    account: 1000000
    freq: day
    # 现货交易成本（Hyperliquid spot taker fee 0.05%）
    exchange_kwargs:
        freq: day
        limit_threshold: 1.0        # crypto 无涨跌停
        deal_price: close
        open_cost: 0.0005           # 买入 taker 0.05%
        close_cost: 0.0005          # 卖出 taker 0.05%
        min_cost: 0                 # 无最低佣金
