# =============================================================
# Orange Quant 深度学习实验 — Transformer
# =============================================================

qlib_init:
    provider_uri: "data/qlib_data/cn_data"
    region: cn

data:
    instruments: csi300

train:
    start: "2008-01-01"
    end: "2014-12-31"
valid:
    start: "2015-01-01"
    end: "2016-12-31"
test:
    start: "2017-01-01"
    end: "2020-08-01"

model:
    name: Transformer
    kwargs:
        d_feat: 20
        hidden_size: 64
        num_layers: 2
        dropout: 0.1
        n_epochs: 100
        lr: 0.001
        early_stop: 10
        batch_size: 800
        metric: loss
        loss: mse
        GPU: 0

dataset:
    step_len: 20

strategy:
    class: MomentumTopKStrategy
    module_path: orange_quant.strategies.mom_topk
    kwargs:
        signal: <PRED>
        topk: 50
        n_drop: 5
        hold_thresh: 1
        risk_degree: 0.95

backtest:
    benchmark: SH000300
    account: 100000000
    freq: day
