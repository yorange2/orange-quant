services:
  orange-quant:
    build: .
    image: orange-quant:latest
    container_name: orange-quant
    restart: unless-stopped

    env_file:
      - .env

    # 挂载模型和数据（需先在服务器上下载好）
    volumes:
      - ./models:/app/models
      - ./data/qlib_data/binance:/app/data/qlib_data/binance

    # 默认每日 00:15 UTC 调仓（北京时间 08:15）
    # 使用 LightGBM 模型预测，如不需要可删除 --model 参数（退化为动量策略）
    command: ["--hour", "0", "--minute", "15", "--model", "models/binance-lgb-momtopk.pkl"]

    profiles:
      - live

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # DRY RUN 模式（观察用，不下单）
  orange-quant-dry:
    build: .
    image: orange-quant:latest
    container_name: orange-quant-dry
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./models:/app/models
      - ./data/qlib_data/binance:/app/data/qlib_data/binance
    command: ["--dry-run", "--hour", "6", "--minute", "00", "--model", "models/binance-lgb-momtopk.pkl"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - dry-run
